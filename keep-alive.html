<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keep-alive Imprimante</title>
    <meta
      name="description"
      content="Page fullscreen pour garder l'imprimante connectee et surveiller /status"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.lime.min.css"
    />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        background: #070a12;
        color: #d7e0ff;
        overflow: hidden;
      }

      .topbar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 10;
        padding: 0.75rem 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(7, 10, 18, 0.72);
        backdrop-filter: blur(6px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .topbar .links a {
        color: #cfe0ff;
        text-decoration: none;
        margin-right: 1rem;
        font-weight: 600;
      }

      .topbar .links a:last-child {
        margin-right: 0;
      }

      .timer {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        font-size: 12px;
        color: #cfe0ff;
        padding: 0.35rem 0.6rem;
        border-radius: 0.6rem;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.05);
        white-space: nowrap;
      }

      .layout {
        height: 100%;
        width: 100%;
        padding-top: 3.2rem; /* topbar height */
        display: grid;
        grid-template-columns: 340px 1fr;
      }

      .logPane {
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        padding: 1rem;
        height: 100%;
        overflow: hidden;
      }

      .logHeader {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 0.75rem;
      }

      .logHeader h2 {
        font-size: 0.95rem;
        margin: 0;
        letter-spacing: 0.02em;
      }

      .logHeader .hint {
        font-size: 12px;
        color: rgba(215, 224, 255, 0.75);
      }

      #log {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        font-size: 12px;
        line-height: 1.35;
        color: #cfe0ff;

        background: rgba(0, 0, 0, 0.22);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 0.9rem;
        padding: 0.75rem;

        height: calc(100% - 70px);
        overflow: auto;

        /* Keep terminal feel */
        white-space: pre-wrap;
        word-break: break-word;
      }

      .error {
        color: #ff4d4d;
        font-weight: 700;
      }

      .iframeWrap {
        height: 100%;
        padding: 1rem;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        border-radius: 0.9rem;
        background: white;
      }

      .statusBadge {
        display: inline-block;
        font-size: 12px;
        padding: 0.2rem 0.55rem;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
        color: rgba(215, 224, 255, 0.8);
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="links">
        <a href="./index.html">Index</a>
        <a href="./keep-alive.html" aria-current="page">Keep-alive</a>
      </div>
      <div class="timer" id="keepAliveTimer">00:00:00</div>
    </div>

    <div class="layout">
      <aside class="logPane">
        <div class="logHeader">
          <h2>Journal Keep-alive</h2>
          <div class="hint">
            <span class="statusBadge">Ping /status chaque 5 min</span>
          </div>
        </div>
        <div id="log" role="log" aria-live="polite"></div>
      </aside>

      <main class="iframeWrap">
        <iframe
          id="printerFrame"
          src="./index.html"
          title="Vue index imprimante"
        ></iframe>
      </main>
    </div>

    <script>
      (function () {
        const SERVER_BASE = "http://localhost:8080";
        const PING_EVERY_MS = 5 * 60 * 1000;

        const logEl = document.getElementById("log");
        const timerEl = document.getElementById("keepAliveTimer");

        const keepAliveStart = Date.now();

        function pad2(n) {
          return String(n).padStart(2, "0");
        }

        function formatDuration(ms) {
          const totalSeconds = Math.floor(ms / 1000);
          const hours = Math.floor(totalSeconds / 3600);
          const minutes = Math.floor((totalSeconds % 3600) / 60);
          const seconds = totalSeconds % 60;
          return (
            pad2(hours) + ":" + pad2(minutes) + ":" + pad2(seconds)
          );
        }

        function updateTimer() {
          timerEl.textContent = formatDuration(Date.now() - keepAliveStart);
        }

        function logLine(message, kind) {
          const timestamp = new Date().toLocaleTimeString();
          const line = document.createElement("div");

          if (kind === "error") {
            line.classList.add("error");
          }

          // Use textContent to avoid HTML injection and keep rendering simple.
          line.textContent = "[" + timestamp + "] " + String(message);
          logEl.appendChild(line);
          logEl.scrollTop = logEl.scrollHeight;
        }

        async function pingStatus() {
          logLine("Ping /status ...");

          try {
            const response = await fetch(SERVER_BASE + "/status", {
              method: "GET",
              cache: "no-store",
            });

            const contentType =
              response.headers.get("content-type") || "";

            let payload;
            if (contentType.includes("application/json")) {
              payload = await response.json();
            } else {
              payload = await response.text();
            }

            if (!response.ok) {
              const message =
                typeof payload === "string"
                  ? payload
                  : JSON.stringify(payload, null, 2);
              throw new Error(
                message || "HTTP error! status: " + response.status
              );
            }

            const rendered =
              typeof payload === "string"
                ? payload
                : JSON.stringify(payload, null, 2);

            logLine(`OK /status : ${rendered}`);
          } catch (err) {
            logLine(`Erreur /status : ${err.message}`, "error");
          }
        }

        // Initial UI
        updateTimer();
        logLine("Keep-alive demarre. Surveillance de la connexion ...");

        // Immediate ping + periodic pings
        pingStatus();
        setInterval(() => {
          pingStatus();
        }, PING_EVERY_MS);

        // Keep timer smooth-ish
        setInterval(updateTimer, 1000);
      })();
    </script>
  </body>
</html>
